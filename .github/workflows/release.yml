name: release

on:
  push:
    branches:
      - main
    paths: 
      - 'modules/**'
      - 'lib/**'
      - '.github/workflows/release.yml'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: latest
          cache: "pnpm"
      - run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: pnpm release
